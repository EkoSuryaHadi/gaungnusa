server {
    server_name gaung.ekosuryahadi.web.id ekosuryahadi.web.id;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gaung.ekosuryahadi.web.id/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gaung.ekosuryahadi.web.id/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Prisma Studio on dedicated port
server {
    listen 5443 ssl;
    server_name gaung.ekosuryahadi.web.id;

    ssl_certificate /etc/letsencrypt/live/gaung.ekosuryahadi.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gaung.ekosuryahadi.web.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5555;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    if ($host = ekosuryahadi.web.id) {
        return 301 https://$host$request_uri;
    }
    if ($host = gaung.ekosuryahadi.web.id) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name gaung.ekosuryahadi.web.id ekosuryahadi.web.id;
    return 404;
}
